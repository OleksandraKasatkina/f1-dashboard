<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}F1 Dashboard{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #0f0f14; color: #f0f0f0; min-height: 100vh; }

        nav { background: #15151e; border-bottom: 3px solid #e10600; padding: 0 24px; display: flex; align-items: center; flex-wrap: wrap; }
        .nav-brand { font-size: 1.4rem; font-weight: 700; color: #e10600; text-decoration: none; padding: 14px 20px 14px 0; margin-right: 8px; letter-spacing: 1px; }
        nav a { color: #ccc; text-decoration: none; padding: 16px 13px; font-size: 0.87rem; border-bottom: 3px solid transparent; margin-bottom: -3px; transition: color .2s, border-color .2s; }
        nav a:hover, nav a.active { color: #fff; border-bottom-color: #e10600; }

        .container { max-width: 1100px; margin: 32px auto; padding: 0 20px; }
        h1 { color: #e10600; font-size: 1.8rem; margin-bottom: 8px; }
        h2 { color: #fff; font-size: 1.15rem; margin: 24px 0 12px; }
        .page-sub { color: #888; font-size: 0.9rem; margin-bottom: 24px; }

        table { width: 100%; border-collapse: collapse; background: #1c1c27; border-radius: 8px; overflow: hidden; }
        th, td { padding: 11px 14px; text-align: left; border-bottom: 1px solid #2a2a38; font-size: 0.88rem; }
        th { background: #15151e; color: #e10600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: .5px; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #23233a; }

        .card { background: #1c1c27; border-radius: 10px; padding: 20px; border: 1px solid #2a2a38; }
        .error { color: #ff6b6b; background: #2a1a1a; padding: 12px 16px; border-radius: 6px; border-left: 4px solid #e10600; margin-bottom: 20px; }
        .info { color: #aaa; font-style: italic; }

        .filter-bar { background: #1c1c27; padding: 14px 20px; border-radius: 8px; margin-bottom: 24px; display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; border: 1px solid #2a2a38; }
        label { font-size: 0.8rem; color: #aaa; display: block; margin-bottom: 4px; }
        select, input[type=text] { background: #0f0f14; color: #f0f0f0; border: 1px solid #3a3a50; padding: 8px 12px; border-radius: 6px; font-size: 0.88rem; min-width: 130px; }
        button, .btn { background: #e10600; color: #fff; border: none; padding: 9px 20px; border-radius: 6px; font-size: 0.88rem; cursor: pointer; text-decoration: none; display: inline-block; transition: background .15s; }
        button:hover, .btn:hover { background: #c40500; }
        .btn-ghost { background: #2a2a38; color: #ccc; }
        .btn-ghost:hover { background: #3a3a50; }

        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.76rem; font-weight: 700; background: #2a2a38; color: #ccc; }
        .badge-gold { background: #4a3800; color: #ffd700; }
        .badge-red  { background: #3a0a0a; color: #ff6b6b; }
        .badge-green{ background: #0a2a0a; color: #6fdc6f; }

        .grid { display: grid; gap: 18px; }
        .grid-2 { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
        .grid-3 { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }

        .tab-bar { display: flex; gap: 0; margin-bottom: 22px; border-bottom: 2px solid #2a2a38; }
        .tab-btn { padding: 10px 20px; background: none; border: none; color: #aaa; cursor: pointer; font-size: 0.88rem; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color .2s, border-color .2s; }
        .tab-btn.active { color: #fff; border-bottom-color: #e10600; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        a { color: #e10600; }
        a:hover { color: #ff4433; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
<nav>
    <a href="{% url 'home' %}" class="nav-brand">F1</a>
    <a href="{% url 'schedule' %}"     {% if request.resolver_match.url_name == 'schedule'     %}class="active"{% endif %}>Schedule</a>
    <a href="{% url 'standings' %}"    {% if request.resolver_match.url_name == 'standings'    %}class="active"{% endif %}>Standings</a>
    <a href="{% url 'results' %}"      {% if request.resolver_match.url_name == 'results'      %}class="active"{% endif %}>Results</a>
    <a href="{% url 'compare' %}"      {% if request.resolver_match.url_name == 'compare'      %}class="active"{% endif %}>Lap Compare</a>
    <a href="{% url 'drivers' %}"      {% if request.resolver_match.url_name == 'drivers'      %}class="active"{% endif %}>Drivers</a>
    <a href="{% url 'constructors' %}" {% if request.resolver_match.url_name == 'constructors' %}class="active"{% endif %}>Constructors</a>
    <a href="{% url 'history' %}"      {% if request.resolver_match.url_name == 'history'      %}class="active"{% endif %}>History</a>
    <a href="{% url 'quiz' %}"         {% if request.resolver_match.url_name == 'quiz'         %}class="active"{% endif %}>Quiz</a>
</nav>
<div class="container">{% block content %}{% endblock %}</div>
<script>
function switchTab(id, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
}
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
